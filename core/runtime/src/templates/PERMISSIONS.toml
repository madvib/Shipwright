# Agent permissions schema (canonical).
# Source of truth: `.ship/agents/permissions.toml`
#
# This file is runtime-owned and parsed by `core/runtime/src/agents/permissions.rs`.
# Keep keys aligned with that struct to avoid drift.

[tools]
# Tool pattern allow/deny lists.
# `allow = ["*"]` means all tools unless denied.
# Patterns are provider/tool specific (e.g. "Bash(*)", "WebFetch(*)", "mcp__ship__*").
allow = ["*"]
deny = []

[filesystem]
# Path globs. Empty means no extra constraints at this layer.
# Example: allow = ["./src/**", "./docs/**"]
allow = []
deny = []

[commands]
# Shell command prefix patterns.
# Example: allow = ["cargo test", "git status"]
allow = []
deny = []

[network]
# one of: "none" | "localhost" | "allow-list" | "unrestricted"
policy = "none"
allow_hosts = []

[agent]
# Optional runtime guardrails.
# max_cost_per_session = 10.0
# max_turns = 40
require_confirmation = []
