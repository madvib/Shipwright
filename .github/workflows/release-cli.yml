name: Release CLI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.1.0)'
        required: true

concurrency:
  group: release-cli-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            suffix: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            suffix: ''
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            suffix: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            suffix: .exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          key: ${{ matrix.target }}

      - name: Build ship
        run: |
          cargo build --release --target ${{ matrix.target }} \
            -p ship-studio-cli

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/ship dist/ship
          chmod +x dist/ship
          tar -czf ship-${{ matrix.target }}.tar.gz -C dist ship

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        run: |
          mkdir dist
          copy target\${{ matrix.target }}\release\ship.exe dist\ship.exe
          Compress-Archive -Path dist\ship.exe -DestinationPath ship-${{ matrix.target }}.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ship-${{ matrix.target }}
          path: ship-${{ matrix.target }}.${{ matrix.archive }}
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Ship ${{ github.ref_name }}
          body: |
            ## Install

            **macOS / Linux (arm64)**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ship-aarch64-apple-darwin.tar.gz | tar -xz
            sudo mv ship /usr/local/bin/
            ```

            **macOS (x86_64)**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ship-x86_64-apple-darwin.tar.gz | tar -xz
            sudo mv ship /usr/local/bin/
            ```

            **Linux (x86_64)**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ship-x86_64-unknown-linux-gnu.tar.gz | tar -xz
            sudo mv ship /usr/local/bin/
            ```

            **Windows (x86_64)**
            Download `ship-x86_64-pc-windows-msvc.zip`, extract, and add to `$PATH`.

            ---

            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          draft: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: artifacts/*
          fail_on_unmatched_files: true
