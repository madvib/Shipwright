name: Ship Smoke Test

on:
  push:
    branches: [main, v0.1.0]
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [main]
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - 'Cargo.lock'

permissions:
  contents: read

concurrency:
  group: ship-smoke-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SHIP_BIN: ${{ github.workspace }}/target/debug/ship

jobs:
  smoke:
    name: CLI Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build ship binary
        run: cargo build -p ship-studio-cli

      - name: ship init --global
        run: "$SHIP_BIN" init --global

      - name: ship init in temp dir
        run: |
          SMOKE_DIR=$(mktemp -d)
          echo "SMOKE_DIR=$SMOKE_DIR" >> "$GITHUB_ENV"
          cd "$SMOKE_DIR"
          "$SHIP_BIN" init
          test -f "$SMOKE_DIR/.ship/ship.jsonc" || { echo "ERROR: ship.jsonc not written"; exit 1; }

      - name: Write fixture agent
        run: |
          mkdir -p "$SMOKE_DIR/.ship/agents"
          printf '{"agent":{"id":"smoke","name":"Smoke","version":"0.1.0","providers":["claude"]},"permissions":{"preset":"ship-standard"}}' > "$SMOKE_DIR/.ship/agents/smoke.jsonc"

      - name: ship use and verify
        run: |
          "$SHIP_BIN" use smoke --path "$SMOKE_DIR"
          test -f "$SMOKE_DIR/CLAUDE.md" || { echo "ERROR: CLAUDE.md not written"; exit 1; }
          echo "Smoke passed."
