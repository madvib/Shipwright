<!DOCTYPE html>
<html data-theme="dark" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprint Monitor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400..800&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --radius: 0.625rem;
      --font-display: "Syne", "Inter", sans-serif;
      --font-body: "DM Sans", "Inter", sans-serif;
      --background: oklch(0.99 0.001 106.423);
      --foreground: oklch(0.147 0.004 49.25);
      --card: oklch(1 0 0);
      --card-foreground: oklch(0.147 0.004 49.25);
      --primary: oklch(0.67 0.16 58);
      --primary-foreground: oklch(0.99 0.02 95);
      --muted: oklch(0.97 0.001 106.424);
      --muted-foreground: oklch(0.45 0.015 58.071);
      --accent: oklch(0.61 0.23 303);
      --border: oklch(0.147 0.004 49.25 / 15%);
      --status-green: oklch(0.65 0.2 150);
      --status-blue: oklch(0.6 0.18 260);
      --status-red: oklch(0.55 0.25 25);
      --status-amber: oklch(0.75 0.15 75);
    }
    [data-theme="dark"] {
      --background: oklch(0.18 0.01 250);
      --foreground: oklch(0.98 0.001 106);
      --card: oklch(0.21 0.01 50);
      --card-foreground: oklch(0.98 0.001 106);
      --primary: oklch(0.77 0.16 70);
      --primary-foreground: oklch(0.2 0.01 50);
      --muted: oklch(0.23 0.01 50);
      --muted-foreground: oklch(0.65 0.015 50);
      --accent: oklch(0.45 0.15 303);
      --border: oklch(1 0 0 / 10%);
      --status-green: oklch(0.65 0.2 150);
      --status-blue: oklch(0.6 0.18 260);
      --status-red: oklch(0.6 0.2 25);
      --status-amber: oklch(0.75 0.15 75);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--background); color: var(--foreground); font-family: var(--font-body); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; overflow: hidden; }
    h1, h2, h3, .display { font-family: var(--font-display); }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); }
    .badge { display: inline-flex; align-items: center; gap: 0.2rem; padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.7rem; font-weight: 500; font-family: var(--font-display); border: 1px solid var(--border); }
    .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.4rem 0.85rem; border-radius: var(--radius); font-family: var(--font-display); font-size: 0.8rem; font-weight: 600; cursor: pointer; border: none; background: var(--primary); color: var(--primary-foreground); transition: opacity 0.15s; }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--foreground); }
    * { scrollbar-width: thin; scrollbar-color: var(--muted) transparent; }
  </style>
</head>
<body>
  <!-- Overview bar -->
  <header id="overview" class="flex items-center gap-5 px-4 py-2.5 border-b" style="border-color:var(--border);background:color-mix(in oklch, var(--card) 60%, transparent);backdrop-filter:blur(12px)">
    <div class="flex items-center gap-2">
      <div style="width:7px;height:7px;border-radius:50%;background:var(--primary)"></div>
      <h1 style="font-size:0.85rem;font-weight:700;margin:0">Sprint</h1>
      <span id="count-label" style="font-size:0.75rem;color:var(--muted-foreground)">0/0 done</span>
    </div>
    <div style="flex:1;max-width:200px">
      <div style="height:6px;border-radius:999px;background:var(--muted);overflow:hidden">
        <div id="progress-bar" style="height:100%;border-radius:999px;background:var(--status-green);width:0%;transition:width 0.5s"></div>
      </div>
    </div>
    <div class="flex items-center gap-4" style="font-size:0.75rem;color:var(--muted-foreground)">
      <span><span id="stat-progress" style="color:var(--status-blue)">0</span> in progress</span>
      <span><span id="stat-blocked" style="color:var(--status-amber)">0</span> blocked</span>
      <span><span id="stat-failed" style="color:var(--status-red)">0</span> failed</span>
    </div>
    <button id="add-job-btn" class="btn" style="margin-left:auto;font-size:0.75rem;padding:0.3rem 0.7rem">Add Job</button>
  </header>

  <!-- Main layout -->
  <div class="flex" style="height:calc(100% - 45px)">
    <!-- DAG -->
    <div id="dag-container" style="flex:1;overflow:auto;padding:16px">
      <svg id="dag-svg" style="min-width:100%;min-height:100%"></svg>
    </div>

    <!-- Detail panel (hidden until selection) -->
    <aside id="detail-panel" class="card" style="display:none;width:280px;border-left:1px solid var(--border);border-radius:0;overflow-y:auto;padding:16px;flex-shrink:0"></aside>
  </div>

  <!-- Create job dialog -->
  <dialog id="create-dialog" style="position:fixed;inset:0;margin:auto;width:380px;background:var(--card);color:var(--foreground);border:1px solid var(--border);border-radius:var(--radius);padding:20px;z-index:50">
    <h2 style="font-family:var(--font-display);font-size:1rem;font-weight:700;margin:0 0 16px">Add Job</h2>
    <form id="create-form" style="display:flex;flex-direction:column;gap:12px">
      <label style="font-size:0.75rem;color:var(--muted-foreground)">Slug *
        <input name="slug" required style="display:block;width:100%;margin-top:4px;padding:6px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--background);color:var(--foreground);font-size:0.85rem" placeholder="auth-tests">
      </label>
      <label style="font-size:0.75rem;color:var(--muted-foreground)">Agent *
        <input name="agent" required style="display:block;width:100%;margin-top:4px;padding:6px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--background);color:var(--foreground);font-size:0.85rem" placeholder="rust-runtime">
      </label>
      <label style="font-size:0.75rem;color:var(--muted-foreground)">Branch
        <input name="branch" style="display:block;width:100%;margin-top:4px;padding:6px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--background);color:var(--foreground);font-size:0.85rem" placeholder="job/auth-tests">
      </label>
      <label style="font-size:0.75rem;color:var(--muted-foreground)">Spec path
        <input name="spec_path" value=".ship-session/job-spec.md" style="display:block;width:100%;margin-top:4px;padding:6px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--background);color:var(--foreground);font-size:0.85rem">
      </label>
      <div id="deps-container" style="display:none">
        <span style="font-size:0.75rem;color:var(--muted-foreground)">Depends on</span>
        <div id="deps-list" style="max-height:100px;overflow-y:auto;margin-top:4px"></div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
        <button type="button" id="cancel-btn" class="btn ghost" style="font-size:0.75rem;padding:0.3rem 0.7rem">Cancel</button>
        <button type="submit" class="btn" style="font-size:0.75rem;padding:0.3rem 0.7rem">Create</button>
      </div>
    </form>
  </dialog>
  <div id="dialog-backdrop" style="display:none;position:fixed;inset:0;background:oklch(0 0 0 / 50%);z-index:49"></div>

  <script src="../ship-sdk.js"></script>
  <script>
    // ── State ──────────────────────────────────────────
    let jobs = []
    let selectedJobId = null

    const NODE_W = 148, NODE_H = 38, GAP_X = 20, GAP_Y = 52, PAD = 20

    const STATUS_COLOR = {
      pending:      'var(--muted-foreground)',
      dispatched:   'var(--status-blue)',
      completed:    'var(--status-green)',
      gate_pending: 'var(--status-amber)',
      blocked:      'var(--status-amber)',
      merged:       'var(--status-green)',
      failed:       'var(--status-red)',
    }
    const STATUS_LABEL = {
      pending: 'Pending', dispatched: 'Dispatched', completed: 'Completed',
      gate_pending: 'Gate Pending', blocked: 'Blocked', merged: 'Merged', failed: 'Failed',
    }

    // ── Data fetching ─────────────────────────────────
    async function loadJobs() {
      try {
        jobs = await ship.jobs.list()
        render()
      } catch (e) {
        console.error('Failed to load jobs:', e)
      }
    }

    // Initial load + poll every 5s (SSE also triggers re-render)
    loadJobs()
    setInterval(loadJobs, 5000)

    ship.events.onStream((envelope) => {
      if (envelope.event_type?.startsWith('job.')) loadJobs()
    })

    // ── Overview bar ──────────────────────────────────
    function updateOverview() {
      const total = jobs.length
      const done = jobs.filter(j => j.status === 'completed' || j.status === 'merged').length
      const progress = jobs.filter(j => j.status === 'dispatched' || j.status === 'gate_pending').length
      const blocked = jobs.filter(j => j.status === 'blocked').length
      const failed = jobs.filter(j => j.status === 'failed').length
      const pct = total > 0 ? Math.round((done / total) * 100) : 0

      document.getElementById('count-label').textContent = `${done}/${total} done`
      document.getElementById('progress-bar').style.width = `${pct}%`
      document.getElementById('stat-progress').textContent = progress
      document.getElementById('stat-blocked').textContent = blocked
      document.getElementById('stat-failed').textContent = failed
    }

    // ── DAG layout (topological sort) ─────────────────
    function layoutDAG() {
      if (!jobs.length) return { nodes: [], edges: [] }

      const bySlug = new Map(jobs.map(j => [j.slug, j]))
      const deps = new Map()
      for (const j of jobs) {
        deps.set(j.slug, new Set((j.depends_on || []).filter(d => bySlug.has(d))))
      }

      const layers = []
      const assigned = new Set()
      const remaining = new Set(jobs.map(j => j.slug))

      while (remaining.size > 0) {
        const layer = []
        for (const slug of remaining) {
          if ([...deps.get(slug)].every(d => assigned.has(d))) layer.push(slug)
        }
        if (layer.length === 0) { layer.push(...remaining); remaining.clear() }
        layer.sort()
        layers.push(layer)
        for (const s of layer) { assigned.add(s); remaining.delete(s) }
      }

      const nodes = []
      const nodeBySlug = new Map()
      for (let li = 0; li < layers.length; li++) {
        for (let ci = 0; ci < layers[li].length; ci++) {
          const slug = layers[li][ci]
          const node = { job: bySlug.get(slug), x: PAD + ci * (NODE_W + GAP_X), y: PAD + li * (NODE_H + GAP_Y) }
          nodes.push(node)
          nodeBySlug.set(slug, node)
        }
      }

      const edges = []
      for (const node of nodes) {
        for (const dep of (node.job.depends_on || [])) {
          const from = nodeBySlug.get(dep)
          if (from) edges.push({ from, to: node })
        }
      }

      return { nodes, edges }
    }

    // ── SVG rendering ─────────────────────────────────
    function renderDAG() {
      const svg = document.getElementById('dag-svg')
      svg.innerHTML = ''
      const { nodes, edges } = layoutDAG()

      if (!nodes.length) {
        svg.setAttribute('width', '400')
        svg.setAttribute('height', '200')
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text')
        text.setAttribute('x', '200')
        text.setAttribute('y', '100')
        text.setAttribute('text-anchor', 'middle')
        text.setAttribute('fill', 'var(--muted-foreground)')
        text.setAttribute('font-size', '14')
        text.textContent = 'No jobs in the queue'
        svg.appendChild(text)
        return
      }

      const maxX = Math.max(...nodes.map(n => n.x)) + NODE_W + PAD
      const maxY = Math.max(...nodes.map(n => n.y)) + NODE_H + PAD
      svg.setAttribute('width', Math.max(maxX, 400))
      svg.setAttribute('height', Math.max(maxY, 200))

      // Arrowhead marker
      const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs')
      defs.innerHTML = `<marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="var(--muted-foreground)" opacity="0.5"/></marker>`
      svg.appendChild(defs)

      // Edges
      for (const { from, to } of edges) {
        const x1 = from.x + NODE_W / 2, y1 = from.y + NODE_H
        const x2 = to.x + NODE_W / 2, y2 = to.y
        const mid = (y1 + y2) / 2
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path')
        path.setAttribute('d', `M ${x1} ${y1} C ${x1} ${mid}, ${x2} ${mid}, ${x2} ${y2}`)
        path.setAttribute('fill', 'none')
        path.setAttribute('stroke', 'var(--muted-foreground)')
        path.setAttribute('stroke-width', '1.2')
        path.setAttribute('opacity', '0.35')
        path.setAttribute('marker-end', 'url(#arrow)')
        svg.appendChild(path)
      }

      // Nodes
      for (const node of nodes) {
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g')
        g.style.cursor = 'pointer'
        g.addEventListener('click', () => { selectedJobId = node.job.job_id; render() })

        const isSelected = node.job.job_id === selectedJobId
        const color = STATUS_COLOR[node.job.status] || 'var(--muted-foreground)'

        // Background rect
        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect')
        rect.setAttribute('x', node.x)
        rect.setAttribute('y', node.y)
        rect.setAttribute('width', NODE_W)
        rect.setAttribute('height', NODE_H)
        rect.setAttribute('rx', '6')
        rect.setAttribute('fill', 'var(--card)')
        rect.setAttribute('stroke', isSelected ? color : 'var(--border)')
        rect.setAttribute('stroke-width', isSelected ? '2' : '1')
        g.appendChild(rect)

        // Status dot
        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle')
        circle.setAttribute('cx', node.x + 14)
        circle.setAttribute('cy', node.y + NODE_H / 2)
        circle.setAttribute('r', '4')
        circle.setAttribute('fill', color)
        g.appendChild(circle)

        // Label
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text')
        text.setAttribute('x', node.x + 26)
        text.setAttribute('y', node.y + NODE_H / 2 + 1)
        text.setAttribute('dominant-baseline', 'middle')
        text.setAttribute('fill', 'var(--foreground)')
        text.setAttribute('font-size', '11')
        text.setAttribute('font-family', 'var(--font-body)')
        const slug = node.job.slug
        text.textContent = slug.length > 15 ? slug.slice(0, 14) + '\u2026' : slug
        g.appendChild(text)

        svg.appendChild(g)
      }
    }

    // ── Detail panel ──────────────────────────────────
    function renderDetail() {
      const panel = document.getElementById('detail-panel')
      const job = jobs.find(j => j.job_id === selectedJobId)

      if (!job) {
        panel.style.display = 'none'
        return
      }

      panel.style.display = 'block'
      const color = STATUS_COLOR[job.status]
      const canLaunch = job.status === 'pending'

      let html = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <h2 style="font-family:var(--font-display);font-size:0.9rem;font-weight:700;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(job.slug)}</h2>
          <span class="badge" style="color:${color};border-color:${color}">${STATUS_LABEL[job.status]}</span>
        </div>
        <dl style="font-size:0.75rem;display:flex;flex-direction:column;gap:10px">
          ${field('Agent', job.agent)}
          ${field('Branch', job.branch)}
          ${field('Spec', job.spec_path)}
          ${job.depends_on?.length ? field('Depends on', job.depends_on.join(', ')) : ''}
          ${job.worktree ? field('Worktree', job.worktree) : ''}
          ${job.blocker ? `<div><dt style="color:var(--muted-foreground);margin-bottom:2px">Blocker</dt><dd style="margin:0;color:var(--status-amber)">${esc(job.blocker)}</dd></div>` : ''}
          ${job.error ? `<div><dt style="color:var(--muted-foreground);margin-bottom:2px">Error</dt><dd style="margin:0;color:var(--status-red);word-break:break-word">${esc(job.error)}</dd></div>` : ''}
          ${field('Created', new Date(job.created_at).toLocaleString())}
          ${field('Updated', new Date(job.updated_at).toLocaleString())}
        </dl>
      `

      if (canLaunch) {
        html += `<button id="launch-btn" class="btn" style="width:100%;margin-top:16px;justify-content:center;font-size:0.8rem;background:var(--status-blue);color:#fff">Launch</button>`
      }

      panel.innerHTML = html

      if (canLaunch) {
        document.getElementById('launch-btn').addEventListener('click', () => launchJob(job))
      }
    }

    function field(label, value) {
      return `<div><dt style="color:var(--muted-foreground);margin-bottom:2px">${label}</dt><dd style="margin:0;font-family:monospace;word-break:break-all">${esc(value)}</dd></div>`
    }

    function esc(s) {
      const el = document.createElement('span')
      el.textContent = s || ''
      return el.innerHTML
    }

    // ── Actions ───────────────────────────────────────
    async function launchJob(job) {
      try {
        await ship.jobs.create({
          slug: job.slug,
          agent: job.agent,
          branch: job.branch,
          spec_path: job.spec_path,
          depends_on: job.depends_on,
        })
        loadJobs()
      } catch (e) {
        console.error('Launch failed:', e)
      }
    }

    // ── Create dialog ─────────────────────────────────
    const dialog = document.getElementById('create-dialog')
    const backdrop = document.getElementById('dialog-backdrop')
    const form = document.getElementById('create-form')

    document.getElementById('add-job-btn').addEventListener('click', () => {
      // Populate deps checkboxes
      const container = document.getElementById('deps-container')
      const list = document.getElementById('deps-list')
      if (jobs.length) {
        container.style.display = 'block'
        list.innerHTML = jobs.map(j => `
          <label style="display:flex;align-items:center;gap:6px;font-size:0.75rem;cursor:pointer;padding:2px 0">
            <input type="checkbox" name="dep" value="${esc(j.slug)}">
            <span style="font-family:monospace">${esc(j.slug)}</span>
          </label>
        `).join('')
      } else {
        container.style.display = 'none'
      }

      // Auto-fill branch from slug
      const slugInput = form.elements.slug
      const branchInput = form.elements.branch
      slugInput.oninput = () => {
        if (!branchInput.value || branchInput.value.startsWith('job/')) {
          branchInput.value = `job/${slugInput.value}`
        }
      }

      dialog.showModal()
      backdrop.style.display = 'block'
    })

    document.getElementById('cancel-btn').addEventListener('click', () => {
      dialog.close()
      backdrop.style.display = 'none'
    })

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      const fd = new FormData(form)
      const slug = fd.get('slug')
      const agent = fd.get('agent')
      const branch = fd.get('branch') || `job/${slug}`
      const specPath = fd.get('spec_path') || '.ship-session/job-spec.md'
      const depCheckboxes = form.querySelectorAll('input[name="dep"]:checked')
      const depsOn = [...depCheckboxes].map(cb => cb.value)

      const jobId = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(36).slice(2)}`
      try {
        await ship.events.emit('job.created', jobId, {
          job_id: jobId,
          slug, agent, branch,
          spec_path: specPath,
          depends_on: depsOn.length ? depsOn : null,
        })
        form.reset()
        dialog.close()
        backdrop.style.display = 'none'
        loadJobs()
      } catch (err) {
        console.error('Create failed:', err)
      }
    })

    // ── Render ────────────────────────────────────────
    function render() {
      updateOverview()
      renderDAG()
      renderDetail()
    }

    // Theme change — re-render (CSS vars handle colors, but SVG may need redraw)
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'theme') render()
    })
  </script>
</body>
</html>
