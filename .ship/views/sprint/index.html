<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprint Monitor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #d1d5db; min-height: 100vh; overflow: hidden; }
  code, .mono { font-family: 'JetBrains Mono', monospace; }
  .node-group { cursor: pointer; transition: opacity 0.15s; }
  .node-group:hover { opacity: 0.85; }
  .edge-line { transition: stroke-opacity 0.15s; }
  .highlight-edge .edge-line { stroke-opacity: 1 !important; stroke-width: 2.5 !important; }
  .dim-edge .edge-line { stroke-opacity: 0.08 !important; }
  .dim-node { opacity: 0.15 !important; }
  .critical-glow { filter: drop-shadow(0 0 6px rgba(239, 68, 68, 0.4)); }
  .detail-enter { animation: slideIn 0.15s ease-out; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #13131a; }
  ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }
  * { scrollbar-width: thin; scrollbar-color: #2a2a3a #13131a; }
</style>
</head>
<body>
<div style="display:flex;height:100vh">
  <div style="flex:1;display:flex;flex-direction:column;min-width:0">
    <header style="border-bottom:1px solid #1e1e2a;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
      <div>
        <h1 style="font-size:16px;font-weight:600;color:#fff;margin:0">Sprint Monitor</h1>
        <p id="header-subtitle" style="font-size:12px;color:#6b7280;margin-top:2px">Loading specs...</p>
      </div>
      <div style="display:flex;align-items:center;gap:16px;font-size:12px">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
          <input type="checkbox" id="toggle-critical" checked style="accent-color:#ef4444;width:14px;height:14px">
          <span style="color:#6b7280">Critical path</span>
        </label>
        <button id="btn-reset" style="padding:4px 12px;background:#13131a;border:1px solid #1e1e2a;border-radius:4px;color:#6b7280;cursor:pointer;font-size:12px;font-family:Inter,sans-serif">Reset view</button>
      </div>
    </header>
    <div id="graph-container" style="flex:1;position:relative;overflow:auto">
      <svg id="graph-svg" style="width:100%;height:100%"></svg>
      <div id="legend" style="position:absolute;bottom:16px;left:16px;background:rgba(19,19,26,0.9);backdrop-filter:blur(8px);border:1px solid #1e1e2a;border-radius:8px;padding:10px 16px;font-size:11px;display:flex;align-items:center;gap:16px">
        <div style="display:flex;align-items:center;gap:6px"><span style="width:12px;height:12px;border-radius:2px;background:#ef4444;display:inline-block"></span> P0 Critical</div>
        <div style="display:flex;align-items:center;gap:6px"><span style="width:12px;height:12px;border-radius:2px;background:#f59e0b;display:inline-block"></span> P1 Important</div>
        <div style="display:flex;align-items:center;gap:6px"><span style="width:12px;height:12px;border-radius:2px;background:#3b82f6;display:inline-block"></span> P2+</div>
        <div style="display:flex;align-items:center;gap:6px"><span style="width:12px;height:12px;border:2px dashed #22c55e;border-radius:2px;display:inline-block"></span> Running</div>
        <div style="display:flex;align-items:center;gap:6px"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;display:inline-block"></span> Done</div>
        <div style="display:flex;align-items:center;gap:6px"><svg width="20" height="10"><line x1="0" y1="5" x2="20" y2="5" stroke="#ef4444" stroke-width="2.5"/></svg> Critical path</div>
      </div>
    </div>
  </div>
  <aside id="side-panel" style="width:360px;border-left:1px solid #1e1e2a;background:#13131a;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden">
    <div id="summary-panel" style="padding:20px;flex:1;overflow-y:auto"></div>
    <div id="detail-panel" style="padding:20px;flex:1;overflow-y:auto;display:none"></div>
  </aside>
</div>

<script src="../ship-sdk.js"></script>
<script>
// -- State --
let specs = [], jobs = [], items = [], waves = [], criticalPath = [], criticalSet = new Set();
let selectedSlug = null, wsId = null, positions = {}, SVG_W = 800, SVG_H = 600;

const NODE_W = 160, NODE_H = 52, WAVE_GAP = 220, NODE_GAP_Y = 16, SURFACE_GAP = 28, MARGIN_L = 60, MARGIN_T = 80;
const SURFACE_ORDER = ['Runtime', 'MCP', 'CLI', 'Studio', 'Compiler', 'Registry', 'Extensions'];
const SURFACE_COLORS = { Runtime:'#6366f1', Studio:'#8b5cf6', CLI:'#06b6d4', Compiler:'#10b981', Registry:'#f97316', MCP:'#f97316', Extensions:'#10b981' };
const PRIORITY_COLORS = { 0:'#ef4444', 1:'#f59e0b', 2:'#3b82f6' };
const PRIORITY_LABELS = { 0:'P0', 1:'P1', 2:'P2' };
const STATUS_LABEL = { spec:'Spec Only', pending:'Pending', dispatched:'Running', completed:'Done', gate_pending:'Gate', blocked:'Blocked', merged:'Merged', failed:'Failed' };
const STATUS_COLORS = { spec:'#6b7280', pending:'#6b7280', dispatched:'#3b82f6', completed:'#22c55e', gate_pending:'#f59e0b', blocked:'#f59e0b', merged:'#22c55e', failed:'#ef4444' };

const FEATURE_MAP = { 'ship-runtime':'Runtime', 'ship-studio':'Studio', 'ship-cli-reference':'CLI', 'ship-cli':'CLI', 'ship-mcp-reference':'MCP', 'ship-mcp':'MCP', 'ship-extensions':'Extensions', 'ship-compiler':'Compiler', 'ship-registry':'Registry' };

function mapSurface(feature) { return FEATURE_MAP[feature] || feature || 'Runtime'; }

// -- Frontmatter parser --
function parseFrontmatter(content) {
  const m = content.match(/^---\n([\s\S]*?)\n---/);
  if (!m) return null;
  const fm = {};
  for (const line of m[1].split('\n')) {
    const idx = line.indexOf(':');
    if (idx === -1) continue;
    const key = line.slice(0, idx).trim();
    let val = line.slice(idx + 1).trim();
    if (val.startsWith('[') && val.endsWith(']')) val = val.slice(1, -1).split(',').map(s => s.trim()).filter(Boolean);
    fm[key] = val;
  }
  return fm;
}

// -- Data fetching --
async function loadData() {
  try {
    if (!wsId) wsId = await ship.workspace.active();
    const [jobList, fileResult] = await Promise.all([
      ship.jobs.list().catch(() => []),
      wsId ? ship.files.list(wsId).catch(() => []) : Promise.resolve([]),
    ]);
    jobs = Array.isArray(jobList) ? jobList : [];
    const jobBySlug = new Map(jobs.map(j => [j.slug, j]));
    const files = fileResult?.data?.files || fileResult?.files || [];
    const specFiles = files.filter(f => f.path && /^specs\/[^/]+\/[^/]+\/spec\.md$/.test(f.path));

    specs = [];
    for (const f of specFiles) {
      try {
        const result = await ship.files.read(wsId, f.path);
        const text = typeof result === 'string' ? result : (result?.data?.content || result?.content || '');
        const fm = parseFrontmatter(text);
        if (fm && fm.slug) specs.push({ ...fm, spec_path: '.ship-session/' + f.path });
      } catch {}
    }

    items = specs.map(spec => {
      const job = jobBySlug.get(spec.slug);
      const p = parseInt(spec.priority, 10);
      return {
        slug: spec.slug, agent: spec.agent || 'unknown', surface: mapSurface(spec.feature),
        priority: isNaN(p) ? 2 : p, depends_on: Array.isArray(spec.depends_on) ? spec.depends_on : [],
        spec_path: spec.spec_path, created: spec.created || '', mode: spec.mode || 'autonomous',
        status: job ? job.status : 'spec', job: job || null,
      };
    });

    computeLayout();
    renderAll();
  } catch (e) { console.error('Failed to load data:', e); }
}

loadData();
setInterval(loadData, 10000);
ship.events.onStream(ev => { if (ev.event_type?.startsWith('job.')) loadData(); });

// -- Layout computation --
function computeWaves() {
  const bySlug = new Map(items.map(i => [i.slug, i]));
  const assigned = new Set();
  waves = [];
  while (assigned.size < items.length) {
    const wave = items.filter(i => !assigned.has(i.slug) && i.depends_on.every(d => assigned.has(d) || !bySlug.has(d)));
    if (!wave.length) { waves.push(items.filter(i => !assigned.has(i.slug))); break; }
    waves.push(wave);
    wave.forEach(i => assigned.add(i.slug));
  }
}

function computeCriticalPath() {
  const bySlug = new Map(items.map(i => [i.slug, i]));
  const memo = new Map();
  function longest(slug) {
    if (memo.has(slug)) return memo.get(slug);
    const item = bySlug.get(slug);
    if (!item) return [];
    const depPaths = item.depends_on.filter(d => bySlug.has(d)).map(d => longest(d));
    const best = depPaths.length > 0 ? depPaths.reduce((a, b) => a.length > b.length ? a : b) : [];
    const result = [...best, slug];
    memo.set(slug, result);
    return result;
  }
  criticalPath = [];
  for (const i of items) { const p = longest(i.slug); if (p.length > criticalPath.length) criticalPath = p; }
  criticalSet = new Set(criticalPath);
}

function computeLayout() {
  computeWaves();
  computeCriticalPath();
  positions = {};
  let maxY = 0;
  waves.forEach((wave, wi) => {
    const x = MARGIN_L + wi * WAVE_GAP;
    const groups = {};
    for (const i of wave) { if (!groups[i.surface]) groups[i.surface] = []; groups[i.surface].push(i); }
    let y = MARGIN_T;
    for (const surface of SURFACE_ORDER) {
      const g = groups[surface]; if (!g) continue;
      for (const item of g) { positions[item.slug] = { x, y }; y += NODE_H + NODE_GAP_Y; }
      y += SURFACE_GAP;
    }
    if (y > maxY) maxY = y;
  });
  SVG_W = MARGIN_L + waves.length * WAVE_GAP + 80;
  SVG_H = maxY + 40;
}

// -- Graph rendering --
function getConnected(slug) {
  const bySlug = new Map(items.map(i => [i.slug, i]));
  const up = new Set(), down = new Set();
  function walkUp(s) { const i = bySlug.get(s); if (!i) return; for (const d of i.depends_on) { if (bySlug.has(d) && !up.has(d)) { up.add(d); walkUp(d); } } }
  function walkDown(s) { for (const i of items) { if (i.depends_on.includes(s) && !down.has(i.slug)) { down.add(i.slug); walkDown(i.slug); } } }
  walkUp(slug); walkDown(slug);
  return { up, down };
}

function esc(s) { const el = document.createElement('span'); el.textContent = s || ''; return el.innerHTML; }
function truncate(s, max) { return s.length > max ? s.slice(0, max - 1) + '\u2026' : s; }

function renderGraph() {
  const svg = document.getElementById('graph-svg');
  if (!items.length) {
    svg.setAttribute('viewBox', '0 0 400 200');
    svg.innerHTML = '<text x="200" y="100" text-anchor="middle" fill="#6b7280" font-size="14">No specs found in .ship-session/specs/</text>';
    return;
  }

  let content = `<defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse"><polygon points="0 0,10 3.5,0 7" fill="#4b5563"/></marker>
    <marker id="arrow-crit" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse"><polygon points="0 0,10 3.5,0 7" fill="#ef4444"/></marker>
  </defs>`;

  // Wave labels and dividers
  waves.forEach((wave, wi) => {
    const x = MARGIN_L + wi * WAVE_GAP + NODE_W / 2;
    content += `<text x="${x}" y="30" text-anchor="middle" fill="#6b7280" font-size="11" font-weight="600" font-family="Inter,sans-serif">Wave ${wi + 1}</text>`;
    content += `<text x="${x}" y="46" text-anchor="middle" fill="#4b5563" font-size="10" font-family="Inter,sans-serif">${wave.length} spec${wave.length > 1 ? 's' : ''}</text>`;
    if (wi > 0) {
      const dx = MARGIN_L + wi * WAVE_GAP - WAVE_GAP / 2 + NODE_W / 2;
      content += `<line x1="${dx}" y1="20" x2="${dx}" y2="${SVG_H - 20}" stroke="#1e1e2a" stroke-width="1" stroke-dasharray="4,4"/>`;
    }
  });

  // Edges
  for (const item of items) {
    for (const dep of item.depends_on) {
      const from = positions[dep], to = positions[item.slug];
      if (!from || !to) continue;
      const isCrit = criticalSet.has(dep) && criticalSet.has(item.slug) && criticalPath.indexOf(item.slug) === criticalPath.indexOf(dep) + 1;
      const x1 = from.x + NODE_W, y1 = from.y + NODE_H / 2, x2 = to.x, y2 = to.y + NODE_H / 2;
      const mx = (x1 + x2) / 2;
      const stroke = isCrit ? '#ef4444' : '#4b5563';
      const sw = isCrit ? 2.5 : 1.2;
      const so = isCrit ? 0.9 : 0.4;
      const marker = isCrit ? 'url(#arrow-crit)' : 'url(#arrow)';
      const cls = isCrit ? 'critical-edge' : '';
      content += `<g class="edge-group ${cls}" data-from="${dep}" data-to="${item.slug}"><path class="edge-line" d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}" fill="none" stroke="${stroke}" stroke-width="${sw}" stroke-opacity="${so}" marker-end="${marker}"/></g>`;
    }
  }

  // Nodes
  for (const item of items) {
    const pos = positions[item.slug]; if (!pos) continue;
    const { x, y } = pos;
    const pColor = PRIORITY_COLORS[item.priority] || '#3b82f6';
    const sColor = SURFACE_COLORS[item.surface] || '#6b7280';
    const isCrit = criticalSet.has(item.slug);
    const isRunning = item.status === 'dispatched';
    const isDone = item.status === 'completed' || item.status === 'merged';
    const isFailed = item.status === 'failed';

    let border;
    if (isDone) border = `stroke="#22c55e" stroke-width="2"`;
    else if (isRunning) border = `stroke="#22c55e" stroke-width="2" stroke-dasharray="6,3"`;
    else if (isFailed) border = `stroke="#ef4444" stroke-width="2"`;
    else border = `stroke="${pColor}" stroke-width="1.5"`;

    const glow = isCrit ? 'critical-glow' : '';
    content += `<g class="node-group ${glow}" data-id="${item.slug}" data-surface="${item.surface}">`;
    content += `<rect x="${x}" y="${y}" width="${NODE_W}" height="${NODE_H}" rx="8" fill="#1a1a24" ${border}/>`;
    content += `<rect x="${x}" y="${y}" width="4" height="${NODE_H}" rx="2" fill="${sColor}"/>`;
    content += `<text x="${x + 14}" y="${y + 20}" font-size="11" font-weight="600" fill="${pColor}" font-family="JetBrains Mono,monospace">${esc(truncate(item.slug, 16))}</text>`;
    content += `<text x="${x + NODE_W - 8}" y="${y + 20}" font-size="9" font-weight="500" fill="${pColor}" text-anchor="end" opacity="0.7">${PRIORITY_LABELS[item.priority] || 'P2'}</text>`;
    content += `<text x="${x + 14}" y="${y + 37}" font-size="10" fill="#d1d5db" font-family="Inter,sans-serif">${esc(truncate(item.surface, 18))}</text>`;
    if (isRunning) content += `<circle cx="${x + NODE_W - 12}" cy="${y + 38}" r="4" fill="#22c55e"/>`;
    if (isDone) content += `<circle cx="${x + NODE_W - 12}" cy="${y + 38}" r="4" fill="#22c55e"/>`;
    if (isFailed) content += `<circle cx="${x + NODE_W - 12}" cy="${y + 38}" r="4" fill="#ef4444"/>`;
    content += `</g>`;
  }

  svg.innerHTML = content;
  svg.setAttribute('viewBox', `0 0 ${SVG_W} ${SVG_H}`);
  svg.style.minWidth = SVG_W + 'px';
  svg.style.minHeight = SVG_H + 'px';

  svg.querySelectorAll('.node-group').forEach(g => {
    g.addEventListener('click', e => { e.stopPropagation(); selectNode(g.dataset.id); });
  });
  svg.addEventListener('click', () => clearSelection());
}

// -- Interaction --
function selectNode(slug) {
  selectedSlug = slug;
  const item = items.find(i => i.slug === slug);
  if (!item) return;
  const { up, down } = getConnected(slug);
  const connected = new Set([slug, ...up, ...down]);

  document.querySelectorAll('.node-group').forEach(g => g.classList.toggle('dim-node', !connected.has(g.dataset.id)));
  document.querySelectorAll('.edge-group').forEach(g => {
    const f = g.dataset.from, t = g.dataset.to;
    const c = connected.has(f) && connected.has(t);
    g.classList.toggle('highlight-edge', c);
    g.classList.toggle('dim-edge', !c);
  });

  showDetail(item, up, down);
}

function clearSelection() {
  selectedSlug = null;
  document.querySelectorAll('.node-group').forEach(g => g.classList.remove('dim-node'));
  document.querySelectorAll('.edge-group').forEach(g => g.classList.remove('highlight-edge', 'dim-edge'));
  document.getElementById('summary-panel').style.display = '';
  document.getElementById('detail-panel').style.display = 'none';
}

function showDetail(item, up, down) {
  document.getElementById('summary-panel').style.display = 'none';
  const panel = document.getElementById('detail-panel');
  panel.style.display = '';

  const pColor = PRIORITY_COLORS[item.priority] || '#3b82f6';
  const sColor = SURFACE_COLORS[item.surface] || '#6b7280';
  const stColor = STATUS_COLORS[item.status] || '#6b7280';
  const waveIdx = waves.findIndex(w => w.some(i => i.slug === item.slug));
  const bySlug = new Map(items.map(i => [i.slug, i]));

  let statusBadge;
  if (item.status === 'completed' || item.status === 'merged') statusBadge = `<span style="padding:2px 8px;border-radius:4px;font-size:11px;background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.3)">${STATUS_LABEL[item.status]}</span>`;
  else if (item.status === 'dispatched') statusBadge = `<span style="padding:2px 8px;border-radius:4px;font-size:11px;background:rgba(59,130,246,0.15);color:#60a5fa;border:1px solid rgba(59,130,246,0.3)">Running</span>`;
  else if (item.status === 'failed') statusBadge = `<span style="padding:2px 8px;border-radius:4px;font-size:11px;background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3)">Failed</span>`;
  else if (item.status === 'spec') statusBadge = `<span style="padding:2px 8px;border-radius:4px;font-size:11px;background:rgba(107,114,128,0.15);color:#9ca3af;border:1px solid rgba(107,114,128,0.3)">Spec Only</span>`;
  else statusBadge = `<span style="padding:2px 8px;border-radius:4px;font-size:11px;background:rgba(107,114,128,0.15);color:#9ca3af;border:1px solid rgba(107,114,128,0.3)">${STATUS_LABEL[item.status] || item.status}</span>`;

  function depBtn(slug) {
    const d = bySlug.get(slug);
    if (!d) return `<span style="font-size:11px;color:#6b7280">${esc(slug)}</span>`;
    const c = PRIORITY_COLORS[d.priority] || '#3b82f6';
    return `<button onclick="selectNode('${esc(slug)}')" style="text-align:left;width:100%;padding:4px 8px;border-radius:4px;font-size:11px;background:none;border:none;color:#d1d5db;cursor:pointer;font-family:inherit" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background='none'"><span class="mono" style="color:${c}">${esc(slug)}</span></button>`;
  }

  let html = `<div class="detail-enter">
    <button id="btn-back" style="font-size:11px;color:#6b7280;background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;margin-bottom:16px;font-family:Inter,sans-serif;padding:0" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#6b7280'">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back to summary
    </button>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap">
      <span class="mono" style="font-size:14px;font-weight:700;color:${pColor}">${esc(item.slug)}</span>
      <span style="font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500;background:${pColor}20;color:${pColor}">${PRIORITY_LABELS[item.priority] || 'P2'}</span>
      ${statusBadge}
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
      <span style="font-size:11px;padding:2px 6px;border-radius:4px;background:${sColor}20;color:${sColor}">${esc(item.surface)}</span>
      <span style="font-size:11px;color:#6b7280">Wave ${waveIdx + 1}</span>
      <span style="font-size:11px;color:#6b7280">Agent: ${esc(item.agent)}</span>
    </div>`;

  // Fields
  html += `<div style="margin-bottom:16px">
    <h4 style="font-size:10px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">Details</h4>
    <div style="font-size:12px;display:flex;flex-direction:column;gap:6px">
      <div><span style="color:#6b7280">Spec: </span><span class="mono" style="font-size:11px;word-break:break-all">${esc(item.spec_path)}</span></div>
      ${item.created ? `<div><span style="color:#6b7280">Created: </span><span style="font-size:11px">${esc(item.created)}</span></div>` : ''}
      <div><span style="color:#6b7280">Mode: </span><span style="font-size:11px">${esc(item.mode)}</span></div>
    </div>
  </div>`;

  // Job info
  if (item.job) {
    html += `<div style="margin-bottom:16px">
      <h4 style="font-size:10px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">Job</h4>
      <div style="font-size:12px;display:flex;flex-direction:column;gap:6px">
        <div><span style="color:#6b7280">Branch: </span><span class="mono" style="font-size:11px">${esc(item.job.branch)}</span></div>
        <div><span style="color:#6b7280">Status: </span><span style="font-size:11px">${esc(item.job.status)}</span></div>
        ${item.job.worktree ? `<div><span style="color:#6b7280">Worktree: </span><span class="mono" style="font-size:11px;word-break:break-all">${esc(item.job.worktree)}</span></div>` : ''}
        ${item.job.blocker ? `<div><span style="color:#f59e0b">Blocker: </span><span style="font-size:11px;color:#fbbf24">${esc(item.job.blocker)}</span></div>` : ''}
        ${item.job.error ? `<div><span style="color:#ef4444">Error: </span><span style="font-size:11px;color:#f87171;word-break:break-word">${esc(item.job.error)}</span></div>` : ''}
        <div><span style="color:#6b7280">Updated: </span><span style="font-size:11px">${new Date(item.job.updated_at).toLocaleString()}</span></div>
      </div>
    </div>`;
  }

  // Dependencies
  if (item.depends_on.length) {
    html += `<div style="margin-bottom:16px">
      <h4 style="font-size:10px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">Dependencies (${item.depends_on.length})</h4>
      ${item.depends_on.map(depBtn).join('')}
    </div>`;
  } else {
    html += `<div style="margin-bottom:16px"><p style="font-size:11px;color:#4ade80">No dependencies -- can start immediately</p></div>`;
  }

  if (up.size) {
    html += `<div style="margin-bottom:16px"><h4 style="font-size:10px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">All Upstream (${up.size})</h4>${[...up].map(depBtn).join('')}</div>`;
  }
  if (down.size) {
    html += `<div style="margin-bottom:16px"><h4 style="font-size:10px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">Unblocks (${down.size})</h4>${[...down].map(depBtn).join('')}</div>`;
  }

  // Launch button
  if (item.status === 'spec') {
    html += `<button id="launch-btn" style="width:100%;margin-top:8px;padding:8px 16px;background:#3b82f6;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif" onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">Launch Job</button>`;
  }

  html += `</div>`;
  panel.innerHTML = html;

  document.getElementById('btn-back').addEventListener('click', clearSelection);
  const launchBtn = document.getElementById('launch-btn');
  if (launchBtn) launchBtn.addEventListener('click', () => launchSpec(item));
}

// -- Summary panel --
function renderSummary() {
  const total = items.length;
  const p0 = items.filter(i => i.priority === 0).length;
  const p1 = items.filter(i => i.priority === 1).length;
  const p2 = items.filter(i => i.priority >= 2).length;
  const done = items.filter(i => i.status === 'completed' || i.status === 'merged').length;
  const running = items.filter(i => i.status === 'dispatched').length;

  document.getElementById('header-subtitle').textContent = total ? `${done}/${total} done, ${running} running` : 'No specs loaded';

  const panel = document.getElementById('summary-panel');
  let html = `<h2 style="font-size:12px;font-weight:600;color:#fff;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:16px">Sprint Summary</h2>`;

  // Stats grid
  html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
    <div style="background:#0a0a0f;border:1px solid #1e1e2a;border-radius:8px;padding:12px"><div style="font-size:22px;font-weight:700;color:#fff">${total}</div><div style="font-size:11px;color:#6b7280">Total specs</div></div>
    <div style="background:#0a0a0f;border:1px solid #1e1e2a;border-radius:8px;padding:12px"><div style="font-size:22px;font-weight:700;color:#ef4444">${p0}</div><div style="font-size:11px;color:#6b7280">P0 Critical</div></div>
    <div style="background:#0a0a0f;border:1px solid #1e1e2a;border-radius:8px;padding:12px"><div style="font-size:22px;font-weight:700;color:#f59e0b">${p1}</div><div style="font-size:11px;color:#6b7280">P1 Important</div></div>
    <div style="background:#0a0a0f;border:1px solid #1e1e2a;border-radius:8px;padding:12px"><div style="font-size:22px;font-weight:700;color:#3b82f6">${p2}</div><div style="font-size:11px;color:#6b7280">P2+</div></div>
  </div>`;

  // Critical path
  if (criticalPath.length) {
    html += `<div style="margin-bottom:20px"><h3 style="font-size:10px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Critical Path</h3>`;
    html += criticalPath.map((slug, i) => `<div style="display:flex;align-items:center;gap:8px;font-size:11px;padding:2px 0"><span style="color:#4b5563">${i + 1}.</span><button onclick="selectNode('${esc(slug)}')" class="mono" style="color:#ef4444;background:none;border:none;cursor:pointer;font-size:11px;font-family:JetBrains Mono,monospace;padding:0">${esc(slug)}</button></div>`).join('');
    html += `<div style="margin-top:6px;font-size:11px;color:#6b7280">Critical path length: <span style="color:#fff;font-weight:500">${criticalPath.length}</span> specs deep</div></div>`;
  }

  // Waves
  if (waves.length) {
    html += `<div style="margin-bottom:20px"><h3 style="font-size:10px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Execution Waves</h3>`;
    html += waves.map((wave, i) => {
      const chips = wave.map(item => {
        const c = PRIORITY_COLORS[item.priority] || '#3b82f6';
        const done = item.status === 'completed' || item.status === 'merged';
        const running = item.status === 'dispatched';
        const tick = done ? ' <span style="color:#4ade80">&#10003;</span>' : running ? ' <span style="color:#60a5fa">&#9679;</span>' : '';
        return `<button onclick="selectNode('${esc(item.slug)}')" style="display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:11px;background:#0a0a0f;border:1px solid #1e1e2a;color:#d1d5db;cursor:pointer;margin:0 4px 4px 0;font-family:JetBrains Mono,monospace" onmouseover="this.style.borderColor='#4b5563'" onmouseout="this.style.borderColor='#1e1e2a'"><span style="color:${c}">${esc(item.slug)}</span>${tick}</button>`;
      }).join('');
      return `<div style="padding:8px;background:#0a0a0f;border:1px solid #1e1e2a;border-radius:6px;margin-bottom:8px"><div style="font-size:11px;color:#6b7280;margin-bottom:6px;font-weight:500">Wave ${i + 1} <span style="color:#4b5563">-- ${wave.length} concurrent</span></div><div style="display:flex;flex-wrap:wrap">${chips}</div></div>`;
    }).join('');
    html += `</div>`;
  }

  // Surfaces
  const surfaceGroups = {};
  items.forEach(i => { if (!surfaceGroups[i.surface]) surfaceGroups[i.surface] = []; surfaceGroups[i.surface].push(i); });
  html += `<div><h3 style="font-size:10px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Surfaces</h3>`;
  for (const s of SURFACE_ORDER) {
    const g = surfaceGroups[s]; if (!g) continue;
    const c = SURFACE_COLORS[s] || '#6b7280';
    html += `<div style="display:flex;align-items:center;justify-content:space-between;font-size:12px;padding:6px 8px;border-radius:4px" onmouseover="this.style.background='rgba(255,255,255,0.03)'" onmouseout="this.style.background='none'"><div style="display:flex;align-items:center;gap:8px"><span style="width:8px;height:8px;border-radius:50%;background:${c};display:inline-block"></span><span style="color:#d1d5db">${s}</span></div><span style="color:#6b7280">${g.length} specs</span></div>`;
  }
  html += `</div>`;

  panel.innerHTML = html;
}

// -- Actions --
async function launchSpec(item) {
  try {
    await ship.jobs.create({ slug: item.slug, agent: item.agent, branch: 'job/' + item.slug, spec_path: item.spec_path, depends_on: item.depends_on.length ? item.depends_on : null });
    await loadData();
  } catch (e) { console.error('Launch failed:', e); }
}

// -- Controls --
document.getElementById('btn-reset').addEventListener('click', () => {
  clearSelection();
  const c = document.getElementById('graph-container');
  c.scrollLeft = 0; c.scrollTop = 0;
});

document.getElementById('toggle-critical').addEventListener('change', e => {
  const show = e.target.checked;
  document.querySelectorAll('.critical-edge .edge-line').forEach(el => {
    el.style.stroke = show ? '#ef4444' : '#4b5563';
    el.style.strokeWidth = show ? '2.5' : '1.2';
    el.style.strokeOpacity = show ? '0.9' : '0.4';
  });
  document.querySelectorAll('.critical-glow').forEach(el => { el.style.filter = show ? '' : 'none'; });
});

// -- Pan --
const container = document.getElementById('graph-container');
let isPanning = false, startX, startY, scrollL, scrollT;
container.addEventListener('mousedown', e => {
  if (e.target.closest('.node-group')) return;
  isPanning = true; startX = e.pageX; startY = e.pageY;
  scrollL = container.scrollLeft; scrollT = container.scrollTop;
  container.style.cursor = 'grabbing';
});
container.addEventListener('mouseleave', () => { isPanning = false; container.style.cursor = ''; });
container.addEventListener('mouseup', () => { isPanning = false; container.style.cursor = ''; });
container.addEventListener('mousemove', e => {
  if (!isPanning) return; e.preventDefault();
  container.scrollLeft = scrollL - (e.pageX - startX);
  container.scrollTop = scrollT - (e.pageY - startY);
});

// -- Render all --
function renderAll() { renderGraph(); renderSummary(); }

window.addEventListener('message', e => { if (e.data?.type === 'theme') renderAll(); });
</script>
</body>
</html>
