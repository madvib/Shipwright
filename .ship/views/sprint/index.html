<!DOCTYPE html>
<html data-theme="dark" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprint Monitor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400..800&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..400&display=swap" rel="stylesheet">

  <style>
    :root {
      --radius: 0.625rem;
      --font-display: "Syne", "Inter", sans-serif;
      --font-body: "DM Sans", "Inter", sans-serif;
      --background: oklch(0.99 0.001 106.423);
      --foreground: oklch(0.147 0.004 49.25);
      --card: oklch(1 0 0);
      --card-foreground: oklch(0.147 0.004 49.25);
      --primary: oklch(0.67 0.16 58);
      --primary-foreground: oklch(0.99 0.02 95);
      --muted: oklch(0.97 0.001 106.424);
      --muted-foreground: oklch(0.45 0.015 58.071);
      --accent: oklch(0.61 0.23 303);
      --border: oklch(0.147 0.004 49.25 / 15%);
      --status-green: oklch(0.65 0.2 150);
      --status-blue: oklch(0.6 0.18 260);
      --status-red: oklch(0.55 0.25 25);
      --status-amber: oklch(0.75 0.15 75);
    }
    [data-theme="dark"] {
      --background: oklch(0.18 0.01 250);
      --foreground: oklch(0.98 0.001 106);
      --card: oklch(0.21 0.01 50);
      --card-foreground: oklch(0.98 0.001 106);
      --primary: oklch(0.77 0.16 70);
      --primary-foreground: oklch(0.2 0.01 50);
      --muted: oklch(0.23 0.01 50);
      --muted-foreground: oklch(0.65 0.015 50);
      --accent: oklch(0.45 0.15 303);
      --border: oklch(1 0 0 / 10%);
      --status-green: oklch(0.65 0.2 150);
      --status-blue: oklch(0.6 0.18 260);
      --status-red: oklch(0.6 0.2 25);
      --status-amber: oklch(0.75 0.15 75);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--background); color: var(--foreground); font-family: var(--font-body); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; overflow: hidden; }
    h1, h2, h3, .display { font-family: var(--font-display); }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); }
    .badge { display: inline-flex; align-items: center; gap: 0.2rem; padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.7rem; font-weight: 500; font-family: var(--font-display); border: 1px solid var(--border); }
    .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.4rem 0.85rem; border-radius: var(--radius); font-family: var(--font-display); font-size: 0.8rem; font-weight: 600; cursor: pointer; border: none; background: var(--primary); color: var(--primary-foreground); transition: opacity 0.15s; }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--foreground); }
    * { scrollbar-width: thin; scrollbar-color: var(--muted) transparent; }
  </style>
</head>
<body>
  <!-- Overview bar -->
  <header id="overview" style="display:flex;align-items:center;gap:20px;padding:10px 16px;border-bottom:1px solid var(--border);background:color-mix(in oklch, var(--card) 60%, transparent);backdrop-filter:blur(12px)">
    <div style="display:flex;align-items:center;gap:8px">
      <div style="width:7px;height:7px;border-radius:50%;background:var(--primary)"></div>
      <h1 style="font-size:0.85rem;font-weight:700;margin:0">Sprint</h1>
      <span id="count-label" style="font-size:0.75rem;color:var(--muted-foreground)">loading...</span>
    </div>
    <div style="flex:1;max-width:200px">
      <div style="height:6px;border-radius:999px;background:var(--muted);overflow:hidden">
        <div id="progress-bar" style="height:100%;border-radius:999px;background:var(--status-green);width:0%;transition:width 0.5s"></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:16px;font-size:0.75rem;color:var(--muted-foreground)">
      <span><span id="stat-progress" style="color:var(--status-blue)">0</span> in progress</span>
      <span><span id="stat-blocked" style="color:var(--status-amber)">0</span> blocked</span>
      <span><span id="stat-failed" style="color:var(--status-red)">0</span> failed</span>
    </div>
  </header>

  <!-- Main layout -->
  <div style="display:flex;height:calc(100% - 45px)">
    <!-- DAG -->
    <div id="dag-container" style="flex:1;overflow:auto;padding:16px">
      <svg id="dag-svg" style="min-width:100%;min-height:100%"></svg>
    </div>

    <!-- Detail panel -->
    <aside id="detail-panel" class="card" style="display:none;width:300px;border-left:1px solid var(--border);border-radius:0;overflow-y:auto;padding:16px;flex-shrink:0"></aside>
  </div>

  <script src="../ship-sdk.js"></script>
  <script>
    // ── State ──────────────────────────────────────────
    let specs = []
    let jobs = []
    let items = []
    let selectedSlug = null
    let wsId = null

    const NODE_W = 160, NODE_H = 42, GAP_X = 20, GAP_Y = 52, PAD = 20

    const STATUS_COLOR = {
      spec:         'var(--muted-foreground)',
      pending:      'var(--muted-foreground)',
      dispatched:   'var(--status-blue)',
      completed:    'var(--status-green)',
      gate_pending: 'var(--status-amber)',
      blocked:      'var(--status-amber)',
      merged:       'var(--status-green)',
      failed:       'var(--status-red)',
    }
    const STATUS_LABEL = {
      spec: 'Spec Only', pending: 'Pending', dispatched: 'Running',
      completed: 'Done', gate_pending: 'Gate', blocked: 'Blocked',
      merged: 'Merged', failed: 'Failed',
    }

    // ── Frontmatter parser ────────────────────────────
    function parseFrontmatter(content) {
      const m = content.match(/^---\n([\s\S]*?)\n---/)
      if (!m) return null
      const fm = {}
      for (const line of m[1].split('\n')) {
        const idx = line.indexOf(':')
        if (idx === -1) continue
        const key = line.slice(0, idx).trim()
        let val = line.slice(idx + 1).trim()
        if (val.startsWith('[') && val.endsWith(']')) {
          val = val.slice(1, -1).split(',').map(s => s.trim()).filter(Boolean)
        }
        fm[key] = val
      }
      return fm
    }

    // ── Data fetching ─────────────────────────────────
    async function loadData() {
      try {
        if (!wsId) wsId = await ship.workspace.active()

        const [jobList, fileResult] = await Promise.all([
          ship.jobs.list().catch(() => []),
          wsId ? ship.files.list(wsId).catch(() => []) : Promise.resolve([]),
        ])

        jobs = Array.isArray(jobList) ? jobList : []
        const jobBySlug = new Map(jobs.map(j => [j.slug, j]))

        // Parse file list — ViewHost returns full { ok, data: { files: [...] } }
        const files = fileResult?.data?.files || fileResult?.files || []

        const specFiles = files.filter(f =>
          f.path && /^specs\/[^/]+\/[^/]+\/spec\.md$/.test(f.path)
        )

        specs = []
        for (const f of specFiles) {
          try {
            const result = await ship.files.read(wsId, f.path)
            const text = typeof result === 'string' ? result
              : (result?.data?.content || result?.content || '')
            const fm = parseFrontmatter(text)
            if (fm && fm.slug) {
              specs.push({ ...fm, spec_path: '.ship-session/' + f.path })
            }
          } catch { /* skip */ }
        }

        // Merge: specs are primary, jobs overlay status
        items = specs.map(spec => {
          const job = jobBySlug.get(spec.slug)
          return {
            slug: spec.slug,
            agent: spec.agent || 'unknown',
            feature: spec.feature || '',
            priority: spec.priority || '',
            depends_on: Array.isArray(spec.depends_on) ? spec.depends_on : [],
            spec_path: spec.spec_path,
            created: spec.created || '',
            mode: spec.mode || 'autonomous',
            status: job ? job.status : 'spec',
            job: job || null,
          }
        })

        render()
      } catch (e) {
        console.error('Failed to load data:', e)
      }
    }

    loadData()
    setInterval(loadData, 10000)
    ship.events.onStream(env => {
      if (env.event_type?.startsWith('job.')) loadData()
    })

    // ── Overview bar ──────────────────────────────────
    function updateOverview() {
      const total = items.length
      const done = items.filter(i => i.status === 'completed' || i.status === 'merged').length
      const active = items.filter(i => i.status === 'dispatched' || i.status === 'gate_pending').length
      const blocked = items.filter(i => i.status === 'blocked').length
      const failed = items.filter(i => i.status === 'failed').length
      const pct = total > 0 ? Math.round((done / total) * 100) : 0

      document.getElementById('count-label').textContent = `${done}/${total} done`
      document.getElementById('progress-bar').style.width = pct + '%'
      document.getElementById('stat-progress').textContent = active
      document.getElementById('stat-blocked').textContent = blocked
      document.getElementById('stat-failed').textContent = failed
    }

    // ── DAG layout ────────────────────────────────────
    function layoutDAG() {
      if (!items.length) return { nodes: [], edges: [] }

      const bySlug = new Map(items.map(i => [i.slug, i]))
      const deps = new Map()
      for (const i of items) {
        deps.set(i.slug, new Set((i.depends_on || []).filter(d => bySlug.has(d))))
      }

      // Topological layers
      const layers = []
      const assigned = new Set()
      const remaining = new Set(items.map(i => i.slug))

      while (remaining.size > 0) {
        const layer = []
        for (const slug of remaining) {
          if ([...deps.get(slug)].every(d => assigned.has(d))) layer.push(slug)
        }
        if (!layer.length) { layer.push(...remaining); remaining.clear() }
        layer.sort()
        layers.push(layer)
        for (const s of layer) { assigned.add(s); remaining.delete(s) }
      }

      const nodes = []
      const nodeBySlug = new Map()
      for (let li = 0; li < layers.length; li++) {
        for (let ci = 0; ci < layers[li].length; ci++) {
          const slug = layers[li][ci]
          const node = { item: bySlug.get(slug), x: PAD + ci * (NODE_W + GAP_X), y: PAD + li * (NODE_H + GAP_Y) }
          nodes.push(node)
          nodeBySlug.set(slug, node)
        }
      }

      const edges = []
      for (const node of nodes) {
        for (const dep of (node.item.depends_on || [])) {
          const from = nodeBySlug.get(dep)
          if (from) edges.push({ from, to: node })
        }
      }

      return { nodes, edges }
    }

    // ── SVG rendering ─────────────────────────────────
    function renderDAG() {
      const svg = document.getElementById('dag-svg')
      svg.innerHTML = ''
      const { nodes, edges } = layoutDAG()

      if (!nodes.length) {
        svg.setAttribute('width', '400')
        svg.setAttribute('height', '200')
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text')
        text.setAttribute('x', '200')
        text.setAttribute('y', '100')
        text.setAttribute('text-anchor', 'middle')
        text.setAttribute('fill', 'var(--muted-foreground)')
        text.setAttribute('font-size', '14')
        text.textContent = 'No specs found in .ship-session/specs/'
        svg.appendChild(text)
        return
      }

      const maxX = Math.max(...nodes.map(n => n.x)) + NODE_W + PAD
      const maxY = Math.max(...nodes.map(n => n.y)) + NODE_H + PAD
      svg.setAttribute('width', Math.max(maxX, 400))
      svg.setAttribute('height', Math.max(maxY, 200))

      // Arrowhead marker
      const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs')
      defs.innerHTML = '<marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="var(--muted-foreground)" opacity="0.5"/></marker>'
      svg.appendChild(defs)

      // Edges
      for (const { from, to } of edges) {
        const x1 = from.x + NODE_W / 2, y1 = from.y + NODE_H
        const x2 = to.x + NODE_W / 2, y2 = to.y
        const mid = (y1 + y2) / 2
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path')
        path.setAttribute('d', `M ${x1} ${y1} C ${x1} ${mid}, ${x2} ${mid}, ${x2} ${y2}`)
        path.setAttribute('fill', 'none')
        path.setAttribute('stroke', 'var(--muted-foreground)')
        path.setAttribute('stroke-width', '1.2')
        path.setAttribute('opacity', '0.35')
        path.setAttribute('marker-end', 'url(#arrow)')
        svg.appendChild(path)
      }

      // Nodes
      for (const node of nodes) {
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g')
        g.style.cursor = 'pointer'
        g.addEventListener('click', () => { selectedSlug = node.item.slug; render() })

        const isSelected = node.item.slug === selectedSlug
        const color = STATUS_COLOR[node.item.status] || 'var(--muted-foreground)'

        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect')
        rect.setAttribute('x', node.x)
        rect.setAttribute('y', node.y)
        rect.setAttribute('width', NODE_W)
        rect.setAttribute('height', NODE_H)
        rect.setAttribute('rx', '6')
        rect.setAttribute('fill', 'var(--card)')
        rect.setAttribute('stroke', isSelected ? color : 'var(--border)')
        rect.setAttribute('stroke-width', isSelected ? '2' : '1')
        g.appendChild(rect)

        // Status dot
        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle')
        circle.setAttribute('cx', node.x + 14)
        circle.setAttribute('cy', node.y + NODE_H / 2)
        circle.setAttribute('r', '4')
        circle.setAttribute('fill', color)
        g.appendChild(circle)

        // Slug label
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text')
        text.setAttribute('x', node.x + 26)
        text.setAttribute('y', node.y + NODE_H / 2 + 1)
        text.setAttribute('dominant-baseline', 'middle')
        text.setAttribute('fill', 'var(--foreground)')
        text.setAttribute('font-size', '11')
        text.setAttribute('font-family', 'var(--font-body)')
        const label = node.item.slug.length > 18 ? node.item.slug.slice(0, 16) + '..' : node.item.slug
        text.textContent = label
        g.appendChild(text)

        svg.appendChild(g)
      }
    }

    // ── Detail panel ──────────────────────────────────
    function renderDetail() {
      const panel = document.getElementById('detail-panel')
      const item = items.find(i => i.slug === selectedSlug)

      if (!item) {
        panel.style.display = 'none'
        return
      }

      panel.style.display = 'block'
      const color = STATUS_COLOR[item.status]
      const canLaunch = item.status === 'spec'
      const isRunning = item.status === 'dispatched'

      let html = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <h2 style="font-family:var(--font-display);font-size:0.9rem;font-weight:700;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(item.slug)}</h2>
          <span class="badge" style="color:${color};border-color:${color}">${STATUS_LABEL[item.status]}</span>
        </div>
        <dl style="font-size:0.75rem;display:flex;flex-direction:column;gap:10px">
          ${field('Agent', item.agent)}
          ${field('Feature', item.feature)}
          ${field('Priority', 'P' + item.priority)}
          ${field('Spec', item.spec_path)}
          ${item.depends_on.length ? field('Depends on', item.depends_on.join(', ')) : ''}
          ${item.created ? field('Created', item.created) : ''}
      `

      if (item.job) {
        html += field('Branch', item.job.branch)
        html += field('Status', item.job.status)
        if (item.job.worktree) html += field('Worktree', item.job.worktree)
        if (item.job.blocker) html += `<div><dt style="color:var(--muted-foreground);margin-bottom:2px">Blocker</dt><dd style="margin:0;color:var(--status-amber)">${esc(item.job.blocker)}</dd></div>`
        if (item.job.error) html += `<div><dt style="color:var(--muted-foreground);margin-bottom:2px">Error</dt><dd style="margin:0;color:var(--status-red);word-break:break-word">${esc(item.job.error)}</dd></div>`
        html += field('Dispatched', new Date(item.job.updated_at).toLocaleString())
      }

      html += '</dl>'

      if (canLaunch) {
        html += `<button id="launch-btn" class="btn" style="width:100%;margin-top:16px;justify-content:center;font-size:0.8rem;background:var(--status-blue);color:#fff">Launch Job</button>`
      }

      panel.innerHTML = html

      if (canLaunch) {
        document.getElementById('launch-btn').addEventListener('click', () => launchSpec(item))
      }
    }

    function field(label, value) {
      return `<div><dt style="color:var(--muted-foreground);margin-bottom:2px">${label}</dt><dd style="margin:0;font-family:monospace;word-break:break-all">${esc(value)}</dd></div>`
    }

    function esc(s) {
      const el = document.createElement('span')
      el.textContent = s || ''
      return el.innerHTML
    }

    // ── Actions ───────────────────────────────────────
    async function launchSpec(item) {
      try {
        await ship.jobs.create({
          slug: item.slug,
          agent: item.agent,
          branch: 'job/' + item.slug,
          spec_path: item.spec_path,
          depends_on: item.depends_on.length ? item.depends_on : null,
        })
        await loadData()
      } catch (e) {
        console.error('Launch failed:', e)
      }
    }

    // ── Render ────────────────────────────────────────
    function render() {
      updateOverview()
      renderDAG()
      renderDetail()
    }

    window.addEventListener('message', e => {
      if (e.data?.type === 'theme') render()
    })
  </script>
</body>
</html>
