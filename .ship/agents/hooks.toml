# Ship agent hooks — compiled into provider-native hook configs by `ship use`.
# These fire regardless of terminal type (tmux, kitty, bare shell).

[[hooks]]
id = "job-session-end"
trigger = "Stop"
command = """
if [ -n "$SHIP_MESH_ID" ] && [ -f "$HOME/.ship/network.port" ]; then
  PORT=$(cat "$HOME/.ship/network.port")
  curl -s -X POST "http://127.0.0.1:$PORT/api/runtime/jobs/end" \
    -H 'Content-Type: application/json' \
    -d "{\"slug\": \"$SHIP_MESH_ID\"}" > /dev/null 2>&1
fi
"""
