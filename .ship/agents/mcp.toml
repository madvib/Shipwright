[mcp.servers.frontend-docs]
id = ""
name = "Frontend Docs Bridge"
command = ""
args = []
scope = "project"
server_type = "http"
url = "http://127.0.0.1:7772/mcp"
disabled = true

[mcp.servers.frontend-docs.env]

[mcp.servers.github]
id = ""
name = "GitHub MCP"
command = "npx"
args = [
    "-y",
    "@modelcontextprotocol/server-github",
]
scope = "project"
server_type = "stdio"
disabled = true

[mcp.servers.github.env]
GITHUB_TOKEN = "${GITHUB_TOKEN}"

[mcp.servers.playwright]
id = ""
name = "Playwright MCP"
command = "npx"
args = ["@playwright/mcp@latest"]
scope = "project"
server_type = "stdio"
disabled = true

[mcp.servers.playwright.env]

[mcp.servers.ship]
id = ""
name = "Shipwright"
command = "ship"
args = ["mcp"]
scope = "project"
server_type = "stdio"
disabled = false
timeout_secs = 30

[mcp.servers.ship.env]

[mcp.servers.rust-docs]
id = ""
name = "Rust Docs Bridge"
command = ""
args = []
scope = "project"
server_type = "http"
url = "http://127.0.0.1:7771/mcp"
disabled = true

[mcp.servers.rust-docs.env]

[mcp.servers.mcp-docs]
id = ""
name = "MCP Docs Bridge"
command = ""
args = []
scope = "project"
server_type = "http"
url = "http://127.0.0.1:7773/mcp"
disabled = true

[mcp.servers.mcp-docs.env]

[mcp.servers.antigravity]
id = ""
name = "Antigravity"
command = "antigravity"
args = ["mcp"]
scope = "project"
server_type = "stdio"
disabled = true

[mcp.servers.antigravity.env]

[mcp.servers.shadcn]
id = ""
name = "shadcn/ui"
command = "npx"
args = [
    "shadcn@latest",
    "mcp",
]
scope = "project"
server_type = "stdio"
disabled = false

[mcp.servers.shadcn.env]
