# Template: Backend Developer
# API, database, and server-side logic. Full write access within scope.

[agent]
id = "template-backend-dev"
name = "Backend Dev"
version = "0.1.0"
description = "APIs, database, and server logic — full write access within backend scope"
providers = ["claude", "codex"]

[skills]
refs = []

[mcp]
servers = []

[permissions]
preset = "ship-autonomous"
tools_deny = ["Bash(rm -rf *)", "Bash(git push --force*)", "Bash(*publish*)"]

[rules]
inline = """
Your domain is server-side code — APIs, database, business logic.
Keep transport layers thin. Business logic belongs in modules, not handlers.
Require tests for behavior changes and bug fixes.
Migrations must be idempotent. Use explicit error handling, never silent fallbacks.
"""
