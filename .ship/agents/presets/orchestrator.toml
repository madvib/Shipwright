[preset]
id = "orchestrator"
name = "Orchestrator — feat/integration"
version = "0.1.0"
description = "Quarterback context — monitors lanes, runs integration, merges work"
providers = ["claude"]

[skills]
refs = ["better-auth", "tanstack-start", "ship-coordination"]

[mcp]
servers = ["ship"]

[plugins]
install = [
  "superpowers@claude-plugins-official",
  "rust-analyzer-lsp@claude-plugins-official",
  "frontend-design@claude-plugins-official",
]
scope = "project"

[permissions]
preset = "ship-standard"
default_mode = "default"

[rules]
inline = """
# Orchestrator — feat/integration

## Role
Quarterback and QC. Monitor lane progress via ship MCP (log_progress, create_note).
Decide when to merge lane branches. Run integration and e2e tests.
Spawn new workspaces when lanes complete.

## Active lanes
- feat/cli-init (~/dev/worktrees/ship-cli) — ship init + ship use + plugin installation
- feat/server-auth (~/dev/worktrees/ship-server) — Better Auth + D1 + /api/github/import
- feat/web-import (~/dev/worktrees/ship-web) — Studio import UI + auth UI

## Merge order
1. feat/cli-init → main (prerequisite for everything)
2. feat/server-auth → main (prerequisite for real import endpoint)
3. feat/web-import → main (after server-auth or standalone with mock)

## Cross-lane dependency signals
Watch for create_note with [UNBLOCKS web-import] from server lane.
When server-auth ships /api/github/import: web lane swaps VITE_USE_MOCK_IMPORT=false.

## Integration checklist (run before each merge)
- [ ] Compiler builds: `cargo build -p ship-compiler`
- [ ] Web builds: `pnpm --filter @ship/web build`
- [ ] Zero lint warnings: `pnpm lint`
- [ ] ship use emits correct provider files for default preset
- [ ] /api/github/import returns valid ProjectLibrary for a known public repo

## Tomorrow's release prep
Plugin lifecycle in ship use must work before release.
Branch-preset tracking (feat/cli-workspace) is post-release.
"""
