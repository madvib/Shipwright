[preset]
name = "Rust Compiler"
id = "rust-compiler"
version = "0.1.0"
description = "Ship compiler crate — WASM build, compiler logic, provider output generation"
providers = ["claude"]

[skills]
refs = []

[mcp]
servers = ["ship"]

[permissions]
preset = "ship-standard"
default_mode = "default"

[rules]
inline = """
Your domain is the Ship compiler — pure transformation logic, no side effects.
Default scope: crates/core/compiler/, packages/compiler/.

The compiler is a WASM module. It must remain pure — no filesystem access, no subprocess calls.
All input comes via function arguments. All output via return values.
CompileOutput is the contract — if you add fields, update the WASM JS bindings too.
After changes: `cargo test -p compiler` must pass, then rebuild WASM:
  wasm-pack build crates/core/compiler --target web --out-dir ../../../packages/compiler --features wasm
Never touch runtime or CLI code — create a job for rust-runtime if you need platform changes.
"""
