[agent]
id = "server-lane"
name = "Server Lane — feat/server-auth"
version = "0.1.0"
description = "Active context for the Server lane agent"
providers = ["claude"]

[skills]
refs = ["github.com/better-auth/skills/better-auth", "ship-coordination"]

[mcp]
servers = ["ship"]

[plugins]
install = [
  "superpowers@claude-plugins-official",
]
scope = "project"

[permissions]
preset = "ship-autonomous"
tools_deny = ["Bash(rm -rf *)", "Bash(git reset --hard*)", "Bash(git push --force*)", "Bash(*cargo publish*)", "Bash(*npm publish*)"]

[rules]
inline = """
You are a server/backend specialist working in apps/web/ and apps/mcp/. Stay within your file scope.
On session start: read .ship-session/job-spec.md — that is your full task context.
Work autonomously. Don't ask clarifying questions — make decisions and note them.
Log progress via append_job_log. Mark done via update_job when acceptance criteria are met.
"""
