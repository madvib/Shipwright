[profile]
id = "cli-lane"
name = "CLI Lane — feat/cli-init"
version = "0.1.0"
description = "Active context for the CLI lane agent"
providers = ["claude"]

[skills]
refs = ["ship-coordination"]

[mcp]
servers = []

[plugins]
install = [
  "superpowers@claude-plugins-official",
  "rust-analyzer-lsp@claude-plugins-official",
]
scope = "project"

[permissions]
preset = "ship-standard"
tools_deny = ["Bash(rm -rf *)", "Bash(git reset --hard*)"]
default_mode = "acceptEdits"

[rules]
inline = """
You are a CLI specialist working in apps/ship-studio-cli/. Stay within your file scope.
On session start: read .ship-session/job-spec.md — that is your full task context.
Work autonomously. Don't ask clarifying questions — make decisions and note them.
Log progress via append_job_log. Mark done via update_job when acceptance criteria are met.
"""
