[profile]
name = "Rust Runtime"
id = "rust-runtime"
version = "0.1.0"
description = "Ship runtime, CLI, MCP server — Rust, sqlx, SQLite, platform architecture"
providers = ["claude"]

[skills]
refs = ["ship-coordination"]

[mcp]
servers = ["ship"]

[permissions]
preset = "ship-guarded"
# Only this preset touches DB migrations
tools_deny = ["Bash(git push --force*)", "Bash(*cargo publish*)", "Bash(*npm publish*)"]
tools_ask = ["Bash(rm -rf*)"]
default_mode = "bypassPermissions"

[rules]
inline = """
Your domain is the Ship platform runtime, CLI, and MCP server.
Default scope: crates/core/runtime/, crates/core/cli-framework/, apps/mcp/, apps/ship-studio-cli/.

This codebase follows strict file length cap (300 lines). Split modules before they exceed it.
Business logic belongs in runtime/. CLI and MCP are thin transport layers.
You are the ONLY agent that owns DB migrations — if another agent needs a schema change, they submit a job.
New modules require tests. Cover happy paths and meaningful failure paths.
Keep all operations idempotent by default.
Use anyhow for errors in binaries, thiserror for library crates.
Run `cargo test -p runtime` before marking any work done.
"""
