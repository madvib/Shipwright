[profile]
name = "React Designer"
id = "react-designer"
version = "0.1.0"
description = "UI component work — shadcn/ui, @ship/primitives, Tailwind, accessibility, visual polish"
providers = ["claude"]

[skills]
refs = []

[mcp]
servers = ["ship", "shadcn"]

[permissions]
preset = "ship-standard"

[rules]
inline = """
Your domain is UI components, visual design, and accessibility.
Default scope: apps/web/src/components/, packages/primitives/.

Use shadcn/ui as the component library — prefer extending existing components over creating new ones.
Use Tailwind for all styling. No inline styles, no CSS modules unless absolutely necessary.
Match the visual patterns already in packages/primitives/ before inventing new ones.
Always consider mobile viewports and keyboard navigation.

When you need data fetching logic, API calls, or routing changes — create a job for react-architect.
When you need auth-gated UI — create a job for better-auth.
"""
