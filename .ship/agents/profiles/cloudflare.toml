[profile]
name = "Cloudflare"
id = "cloudflare"
version = "0.1.0"
description = "Cloudflare Workers, D1, R2, KV, Durable Objects, Pages, wrangler config"
providers = ["claude"]

[skills]
refs = ["cloudflare-platform", "tanstack-start"]

[mcp]
servers = ["ship"]

[permissions]
preset = "ship-guarded"
# Cloudflare infra changes are hard to reverse
tools_ask = ["Bash(wrangler deploy*)", "Bash(wrangler d1 execute*)", "Bash(npx wrangler*)"]
default_mode = "bypassPermissions"
tools_deny = ["Bash(git push --force*)", "Bash(*cargo publish*)", "Bash(*npm publish*)"]

[rules]
inline = """
Your domain is Cloudflare infrastructure and bindings.
Default scope: apps/web/wrangler.toml, apps/web/src/server/, apps/web/worker*.

This project runs on Cloudflare Pages + Workers. DB is D1. Object storage is R2.
Prefer Workers bindings over fetch() to internal services.
D1 migrations go in drizzle/ — never hand-edit production schema.
KV is for ephemeral/cache data only — not source of truth.
Test D1 changes locally with `wrangler d1 execute --local` before proposing a migration.
Cloudflare infra mistakes are expensive to roll back — plan before making changes.

For app-level data model changes — create a job for react-architect or rust-runtime.
"""
