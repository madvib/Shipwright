[profile]
id = "web-lane"
name = "Web Lane — feat/web-import"
version = "0.1.0"
description = "Active context for the Web lane agent"
providers = ["claude"]

[skills]
refs = ["tanstack-start", "better-auth", "ship-coordination"]

[mcp]
servers = []

[plugins]
install = [
  "superpowers@claude-plugins-official",
  "frontend-design@claude-plugins-official",
]
scope = "project"

[permissions]
preset = "ship-standard"
tools_deny = ["Bash(rm -rf *)", "Bash(git reset --hard*)"]
default_mode = "acceptEdits"

[rules]
inline = """
You are a web specialist working in apps/web/. Stay within your file scope.
Read job-spec.md in the worktree root for your full task context.
Work autonomously. Don't ask clarifying questions — make reasonable decisions and note them.
Log progress via append_job_log. Mark done via update_job when acceptance criteria are met.

NEVER touch: wrangler.toml, wrangler.jsonc, package.json, pnpm-lock.yaml, src/routeTree.gen.ts
"""
