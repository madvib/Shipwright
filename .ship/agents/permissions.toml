# Ship permission presets — strict → loose continuum.
#
# Referenced via: [permissions] preset = "<name>"
# Presets are templates, not security boundaries. Users customize from here.
# Studio presents these as clickable options that prefill the permission form.

[ship-readonly]
# Read-only analysis. Reviewer agents, gate agents, auditors, tutors.
default_mode = "plan"
tools_allow = [
  "Read",
  "Glob",
  "Grep",
  "Bash(ship *)",
  "mcp__ship__*",
  "mcp__*__read*",
  "mcp__*__list*",
  "mcp__*__search*",
]
tools_deny = [
  "Write(*)",
  "Edit(*)",
  "Bash(rm*)",
]

[ship-standard]
# Interactive sessions. Human-paired work, commander, brainstorming.
# Default for new profiles in Studio.
default_mode = "default"
tools_allow = [
  "Read",
  "Glob",
  "Grep",
  "Bash(ship *)",
  "mcp__ship__*",
]

[ship-autonomous]
# Dispatched specialist agents working in worktrees. Zero prompts, explicit allow list.
# dontAsk + allow = agent works autonomously within the boundary.
# bypassPermissions is for ephemeral environments only (CI, devcontainers).
default_mode = "dontAsk"
tools_allow = [
  "Read",
  "Write",
  "Edit",
  "Glob",
  "Grep",
  "Bash(cargo *)",
  "Bash(git add *)",
  "Bash(git commit *)",
  "Bash(git status*)",
  "Bash(git diff*)",
  "Bash(git log*)",
  "Bash(git branch*)",
  "Bash(npm *)",
  "Bash(pnpm *)",
  "Bash(ship *)",
  "Bash(wc *)",
  "Bash(ls *)",
  "Bash(cat *)",
  "Bash(head *)",
  "Bash(tail *)",
  "Bash(mkdir *)",
  "mcp__ship__*",
]
tools_deny = [
  "Bash(rm -rf *)",
  "Bash(git reset --hard*)",
  "Bash(git push --force*)",
  "Bash(cargo publish*)",
  "Bash(npm publish*)",
]

[ship-elevated]
# Deploy and release agents. Unlocks git push and publish.
default_mode = "dontAsk"
tools_allow = [
  "Read",
  "Write",
  "Edit",
  "Glob",
  "Grep",
  "Bash(cargo *)",
  "Bash(git *)",
  "Bash(npm *)",
  "Bash(pnpm *)",
  "Bash(ship *)",
  "Bash(wc *)",
  "Bash(ls *)",
  "Bash(cat *)",
  "Bash(head *)",
  "Bash(tail *)",
  "Bash(mkdir *)",
  "mcp__ship__*",
]
tools_deny = [
  "Bash(rm -rf *)",
  "Bash(git reset --hard*)",
  "Bash(git push --force*)",
]
