# Ship permission presets — strict → loose continuum.
#
# Referenced via: [permissions] preset = "<name>"
# Presets are templates, not security boundaries. Users customize from here.
# Studio presents these as clickable options that prefill the permission form.
#
# Base rules are injected by the compiler into ALL presets automatically:
#   always_allow = ["mcp__ship__*", "Bash(ship *)"]
#   always_deny  = ["Bash(sqlite3 ~/.ship/*)", "Bash(git push*)", "Bash(*publish*)",
#                    "Read(.env*)", "Write(.env*)", "Read(.dev.vars*)", "Write(.dev.vars*)",
#                    "Read(credentials*)", "Write(credentials*)", "Read(secrets/*)", "Write(secrets/*)"]
#   always_ask   = ["Write(.ship/*)", "Edit(.ship/*)"]
#   autoMemoryEnabled = false

[ship-readonly]
# Read-only analysis. Reviewer agents, gate agents, auditors.
default_mode = "plan"
tools_deny = [
  "Write(*)",
  "Edit(*)",
  "Bash(rm*)",
]

[ship-standard]
# Interactive sessions. Human-paired work, commander, brainstorming.
# Default for new profiles in Studio.
default_mode = "default"

[ship-autonomous]
# Dispatched specialist agents working in worktrees. Zero prompts.
default_mode = "dontAsk"

[ship-elevated]
# Deploy and release agents. Unlocks git push and publish.
default_mode = "dontAsk"
tools_allow_override = [
  "Bash(git push*)",
  "Bash(*publish*)",
]
