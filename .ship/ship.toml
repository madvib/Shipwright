id = "bzwmeMdT"

[module]
name = "github.com/madvib/ship"
version = "0.1.0"
description = "Compiler and package manager for AI agent configuration"
license = "MIT"

[dependencies]
"github.com/garrytan/gstack" = "main"
"github.com/better-auth/skills" = "main"

[exports]
# Universal skills — useful to any Ship user
skills = [
    "agents/skills/configure-agent",
    "agents/skills/find-skills",
    "agents/skills/write-adr",
    "agents/skills/tdd",
    "agents/skills/visual-brainstorm",
    "agents/skills/visual-spec",
    "agents/skills/ship-skills-guide",
    "agents/skills/ship-help",
    "agents/skills/ship-publishing",
    # Doc-skills — help agent references
    "agents/skills/ship-tutorial",
    "agents/skills/ship-cli-reference",
    "agents/skills/ship-schema-reference",
    "agents/skills/ship-permissions",
]
# Private skills (commander, ship-coordination, spawn-agent) encode project-specific conventions
# and are not exported. They remain available locally for this project's agents.
agents = [
    "agents/profiles/better-auth.toml",
    "agents/profiles/cli-lane.toml",
    "agents/profiles/cloudflare.toml",
    "agents/profiles/commander.toml",
    "agents/profiles/default.toml",
    "agents/profiles/gstack.toml",
    "agents/profiles/react-architect.toml",
    "agents/profiles/react-designer.toml",
    "agents/profiles/reviewer.toml",
    "agents/profiles/rust-compiler.toml",
    "agents/profiles/rust-lane.toml",
    "agents/profiles/rust-runtime.toml",
    "agents/profiles/server-lane.toml",
    "agents/profiles/test-writer.toml",
    "agents/profiles/web-lane.toml",
]
