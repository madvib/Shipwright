version = "1"
id = "hRvMUz4p"
name = "Ship"
description = "AI native project management workspace"

[[statuses]]
id = "backlog"
name = "Backlog"
color = "gray"

[[statuses]]
id = "blocked"
name = "Blocked"
color = "red"

[[statuses]]
id = "in-progress"
name = "In Progress"
color = "blue"

[[statuses]]
id = "review"
name = "Review"
color = "yellow"

[[statuses]]
id = "done"
name = "Done"
color = "green"

[[namespaces]]
id = "project"
path = "project"
owner = "project"

[[namespaces]]
id = "workflow"
path = "workflow"
owner = "workflow"

[[namespaces]]
id = "agents"
path = "agents"
owner = "agents"

[[namespaces]]
id = "generated"
path = "generated"
owner = "runtime"

[git]
ignore = [
    "events.ndjson",
    "issues",
    "notes",
    "releases",
    "features",
    "specs",
    "adrs",
    "templates",
]
commit = [
    "ship.toml",
    "agents",
]
