version = "1"
modes = []
hooks = []
providers = ["claude"]

[[statuses]]
id = "backlog"
name = "Backlog"
color = "gray"

[[statuses]]
id = "blocked"
name = "Blocked"
color = "red"

[[statuses]]
id = "in-progress"
name = "In Progress"
color = "blue"

[[statuses]]
id = "done"
name = "Done"
color = "green"

[git]
ignore = [
    "events.ndjson",
    "issues",
]
commit = [
    "releases",
    "features",
    "specs",
    "adrs",
    "templates",
    "ship.toml",
]

[[mcp_servers]]
id = "ship"
name = "Shipwright"
command = "/home/madvib/.cargo/bin/ship-mcp"
args = []
scope = "project"
server_type = "stdio"
disabled = false

[mcp_servers.env]

[agent]
skills = ["task-policy"]
prompts = []
context = []

[[namespaces]]
id = "project"
path = "project"
owner = "project"

[[namespaces]]
id = "workflow"
path = "workflow"
owner = "workflow"

[[namespaces]]
id = "agents"
path = "agents"
owner = "agents"

[[namespaces]]
id = "generated"
path = "generated"
owner = "runtime"
