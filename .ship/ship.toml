version = "1"
name = "Shipwright"
description = "AI native project managment "
modes = []
hooks = []

[[statuses]]
id = "backlog"
name = "Backlog"
color = "gray"

[[statuses]]
id = "blocked"
name = "Blocked"
color = "red"

[[statuses]]
id = "in-progress"
name = "In Progress"
color = "blue"

[[statuses]]
id = "done"
name = "Done"
color = "green"

[git]
ignore = [
    "events.ndjson",
    "issues",
    "notes",
]
commit = [
    "releases",
    "features",
    "specs",
    "adrs",
    "templates",
    "ship.toml",
    "agents",
]

[[mcp_servers]]
id = "shadcn"
name = "shadcn/ui"
command = "npx"
args = [
    "shadcn@latest",
    "mcp",
]
scope = "global"
server_type = "stdio"
disabled = false

[mcp_servers.env]

[[mcp_servers]]
id = "ship"
name = "Shipwright"
command = "ship"
args = ["mcp"]
disabled = false
timeout_secs = 30
server_type = "stdio"

[mcp_servers.env]

[agent]
skills = [
    "clean-code",
    "solid",
    "task-policy",
    "skill-1772336621485",
]
prompts = []
context = []
rules = []

[[namespaces]]
id = "project"
path = "project"
owner = "project"

[[namespaces]]
id = "workflow"
path = "workflow"
owner = "workflow"

[[namespaces]]
id = "agents"
path = "agents"
owner = "agents"

[[namespaces]]
id = "generated"
path = "generated"
owner = "runtime"
